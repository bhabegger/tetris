name: Pull Request Validation

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  validate:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    
    - name: Validate Maven project
      run: mvn -B validate
    
    - name: Compile code
      run: mvn -B clean compile
    
    - name: Run all tests
      run: mvn -B test
    
    - name: Verify build
      run: mvn -B verify
    
    - name: Check for test failures
      if: failure()
      run: |
        echo "Tests failed! Please fix the failing tests before merging."
        exit 1
    
    - name: Comment PR with test results
      if: always()
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const testResults = fs.existsSync('target/surefire-reports') 
            ? 'Tests completed. Check the workflow logs for details.' 
            : 'No test results found.';
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: `## Build Status\n\n✅ Build and tests completed.\n\n${testResults}`
          });

